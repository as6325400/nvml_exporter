name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Byte-compile
        run: python -m compileall -q nvml_user_exporter.py
      - name: Import sanity
        run: python -c "import nvml_user_exporter; print('import OK')"
      - name: CLI --help
        run: python nvml_user_exporter.py --help

  dashboards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Grafana JSON
        run: |
          for f in grafana/*.json; do
            echo "validating $f"
            python -m json.tool "$f" > /dev/null
          done

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck tools/gpu-docker
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./tools
